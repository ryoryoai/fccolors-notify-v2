name: FC COLORS Notify V2

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only"
        type: boolean
        default: false
      reparse_all:
        description: "Force reparse all tracked articles"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
      - run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ "${{ inputs.reparse_all }}" = "true" ]; then
            ARGS="$ARGS --reparse-all"
          fi
          python -m fccolors_notify_v2.cli $ARGS
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          LINE_GROUP_2017: ${{ secrets.LINE_GROUP_2017 }}
          CALENDAR_ID_2017: ${{ secrets.CALENDAR_ID_2017 }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
